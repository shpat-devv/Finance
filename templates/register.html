{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
<main class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto; text-align: center;">
        <h2>Create Account</h2>
        <form action="/register" method="post">
            <input autocomplete="off" autofocus name="username" placeholder="Username" type="text">
            <input name="password" placeholder="Password" type="password">
            <input name="confirmation" placeholder="Confirm Password" type="password">
            <button type="submit">Register</button>
        </form>
        <p style="margin-top: 1rem; font-weight: 600;">Already have an account? <a href="/login" style="color: #00d4ff;">Login</a></p>
    </div>
</main>
{% endblock %}
