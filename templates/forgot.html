{% extends "layout.html" %}

{% block title %}
    Forgot Password
{% endblock %}

{% block main %}
    <main class="container">
        <h2>Forgot Password</h2>
        <div class="card" style="max-width: 400px; margin: 4rem auto; text-align: center;">
            <form action="/forgot" method="post">
                <input autocomplete="off" autofocus name="username" placeholder="Username" type="text">
                <input name="password" placeholder="New Password" type="password">
                <input name="confirmation" placeholder="Confirm New Password" type="password">
                <button type="submit">Reset Password</button>
            </form>
            <p style="margin-top: 1rem; font-weight: 600;">Already have an account? <a href="/login" style="color: #00d4ff;">Login</a></p>
        </div>
    </main>
{% endblock %}
