{% extends "layout.html" %}

{% block title %}
    Buy Stocks
{% endblock %}

{% block main %}
    <div class="container mt-4">
        <form action="/buy" method="post">
            <input type="text" name="symbol" placeholder="Enter a symbol" required>
            <input type="text" name="shares" placeholder="Enter number of shares" required>
            <button type="submit" class="btn btn-primary">Submit</button>   
        </form>
    </div>
{% endblock %}
