{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<main class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto; text-align: center;">
        <h2>Log In</h2>
        <form action="/login" method="post">
            <input autocomplete="off" autofocus name="username" placeholder="Username" type="text">
            <input name="password" placeholder="Password" type="password">
            <button type="submit">Log In</button>
        </form>
        <p style="margin-top: 1rem; font-weight: 600;">Don't have an account? <a href="/register" style="color: #00d4ff;">Register</a></p>
        <a class="btn btn-link" href="/forgot">Forgot Password?</a>
    </div>
</main>
{% endblock %}
